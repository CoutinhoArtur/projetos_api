<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Cães</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #eee;
            margin-bottom: 1.5rem;
            display: block;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #ff7f50;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #ff6347;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Encontre um novo amigo! 🐾</h2>
        
        <img id="dogImage" src="https://via.placeholder.com/300?text=Clique+abaixo" alt="Foto de um cão">
        
        <br>
        
        <button id="btnGenerate">Gerar Cão</button>
    </div>

    <script>
        const btn = document.querySelector('#btnGenerate');
        const img = document.querySelector('#dogImage');

        // Função para procurar a imagem na API
        async function fetchDog() {
            try {
                // Alterar o texto do botão enquanto carrega
                btn.textContent = "A carregar...";
                
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();

                // Atualizar o src da imagem com a propriedade 'message' do JSON
                img.src = data.message;
                
                btn.textContent = "Gerar Cão";
            } catch (error) {
                console.error("Erro ao procurar o cão:", error);
                alert("Ops! Algo correu mal ao buscar a imagem.");
                btn.textContent = "Gerar Cão";
            }
        }

        // Adicionar o evento de clique ao botão
        btn.addEventListener('click', fetchDog);
    </script>

</body>
</html>
