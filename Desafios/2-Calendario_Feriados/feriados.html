<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feriados Nacionais 2024</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Lista de Feriados Nacionais - 2024</h2>

    <table class="table table-striped table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Data</th>
                <th>Nome do Feriado</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>

    <script>
        // 2. Evento disparado quando a página termina de carregar
        document.addEventListener("DOMContentLoaded", () => {
            const url = "https://brasilapi.com.br/api/feriados/v1/2024";
            const corpoTabela = document.getElementById("tabela-corpo");

            // Fazendo o fetch para a API
            fetch(url)
                .then(response => response.json())
                .then(feriados => {
                    // 4. Percorrendo os feriados com forEach
                    feriados.forEach(feriado => {
                        // 5. Criando a linha (tr) e as células (td)
                        const linha = document.createElement("tr");

                        // Formatando a data de AAAA-MM-DD para DD/MM/AAAA
                        const dataFormatada = feriado.date.split('-').reverse().join('/');

                        linha.innerHTML = `
                            <td>${dataFormatada}</td>
                            <td>${feriado.name}</td>
                        `;

                        // Inserindo a linha no corpo da tabela
                        corpoTabela.appendChild(linha);
                    });
                })
                .catch(error => {
                    console.error("Erro ao buscar feriados:", error);
                    corpoTabela.innerHTML = "<tr><td colspan='2' class='text-danger'>Erro ao carregar dados.</td></tr>";
                });
        });
    </script>

</body>
</html>
